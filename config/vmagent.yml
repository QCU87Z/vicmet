global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: "vmstorage"
    static_configs:
      - targets: ["vmstorage:8482"]
        labels:
          component: "vmstorage"

  - job_name: "vminsert"
    static_configs:
      - targets: ["vminsert:8480"]
        labels:
          component: "vminsert"

  - job_name: "vmselect"
    static_configs:
      - targets: ["vmselect:8481"]
        labels:
          component: "vmselect"

  - job_name: "vmauth-write"
    static_configs:
      - targets: ["vmauth-write:8427"]
        labels:
          component: "vmauth-write"

  - job_name: "vmauth-read"
    static_configs:
      - targets: ["vmauth-read:8427"]
        labels:
          component: "vmauth-read"

  - job_name: "vmagent"
    static_configs:
      - targets: ["vmagent:8429"]
        labels:
          component: "vmagent"
