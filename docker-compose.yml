services:

  # ──────────────────────────────────────────────────────────────────────────
  # Storage layer
  # ──────────────────────────────────────────────────────────────────────────
  vmstorage:
    image: victoriametrics/vmstorage:latest
    restart: unless-stopped
    networks:
      - vm-cluster
    ports:
      - "8482:8482"   # HTTP / web UI  → http://localhost:8482
    expose:
      - "8400"   # vminsert port (internal only)
      - "8401"   # vmselect port (internal only)
    volumes:
      - vmstorage-data:/storage
    command:
      - "--storageDataPath=/storage"
      - "--retentionPeriod=1"
      - "--httpListenAddr=:8482"
      - "--vminsertAddr=:8400"
      - "--vmselectAddr=:8401"

  vmstorage2:
    image: victoriametrics/vmstorage:latest
    restart: unless-stopped
    networks:
      - vm-cluster
    ports:
      - "8492:8482"   # HTTP / web UI  → http://localhost:8492
    expose:
      - "8400"   # vminsert port (internal only)
      - "8401"   # vmselect port (internal only)
    volumes:
      - vmstorage2-data:/storage
    command:
      - "--storageDataPath=/storage"
      - "--retentionPeriod=1"
      - "--httpListenAddr=:8482"
      - "--vminsertAddr=:8400"
      - "--vmselectAddr=:8401"

  # ──────────────────────────────────────────────────────────────────────────
  # Insert layer  (no direct auth — sits behind vmauth-write)
  # ──────────────────────────────────────────────────────────────────────────
  vminsert:
    image: victoriametrics/vminsert:latest
    restart: unless-stopped
    networks:
      - vm-cluster
    ports:
      - "8485:8480"   # web UI / status → http://localhost:8485
    command:
      - "--storageNode=vmstorage:8400"
      - "--storageNode=vmstorage2:8400"
      - "--httpListenAddr=:8480"
    depends_on:
      - vmstorage
      - vmstorage2

  # ──────────────────────────────────────────────────────────────────────────
  # Select / query layer  (no direct auth — sits behind vmauth-read)
  # ──────────────────────────────────────────────────────────────────────────
  vmselect:
    image: victoriametrics/vmselect:latest
    restart: unless-stopped
    networks:
      - vm-cluster
    ports:
      - "8486:8481"   # VMUI + query API → http://localhost:8486/vmui
    command:
      - "--storageNode=vmstorage:8401"
      - "--storageNode=vmstorage2:8401"
      - "--httpListenAddr=:8481"
    depends_on:
      - vmstorage
      - vmstorage2

  # ──────────────────────────────────────────────────────────────────────────
  # Auth proxy — WRITE path
  # Basic-auth → routes each user to their tenant's vminsert URL prefix
  # ──────────────────────────────────────────────────────────────────────────
  vmauth-write:
    image: victoriametrics/vmauth:latest
    restart: unless-stopped
    networks:
      - vm-cluster
    ports:
      - "8480:8427"   # authenticated write endpoint → http://localhost:8480
    volumes:
      - ./config/vmauth-write.yml:/etc/vmauth/config.yml:ro
    command:
      - "--auth.config=/etc/vmauth/config.yml"
      - "--httpListenAddr=:8427"
    depends_on:
      - vminsert

  # ──────────────────────────────────────────────────────────────────────────
  # Auth proxy — READ path
  # Basic-auth → routes each user to their tenant's vmselect URL prefix
  # ──────────────────────────────────────────────────────────────────────────
  vmauth-read:
    image: victoriametrics/vmauth:latest
    restart: unless-stopped
    networks:
      - vm-cluster
    ports:
      - "8481:8427"   # authenticated read/query endpoint → http://localhost:8481
    volumes:
      - ./config/vmauth-read.yml:/etc/vmauth/config.yml:ro
    command:
      - "--auth.config=/etc/vmauth/config.yml"
      - "--httpListenAddr=:8427"
    depends_on:
      - vmselect

  # ──────────────────────────────────────────────────────────────────────────
  # vmagent — scrapes /metrics from every cluster component and ships them
  #            to the common tenant (accountID=0) via vmauth-write
  # ──────────────────────────────────────────────────────────────────────────
  vmagent:
    image: victoriametrics/vmagent:latest
    restart: unless-stopped
    networks:
      - vm-cluster
    ports:
      - "8429:8429"   # vmagent web UI / targets → http://localhost:8429
    volumes:
      - ./config/vmagent.yml:/etc/vmagent/config.yml:ro
      - vmagent-data:/vmagentdata
    command:
      - "--promscrape.config=/etc/vmagent/config.yml"
      - "--httpListenAddr=:8429"
      - "--remoteWrite.tmpDataPath=/vmagentdata"
      # vmagent writes directly to vminsert's multitenant endpoint.
      # Tenant routing is done via the __vm_account_id label set per scrape job.
      - "--remoteWrite.url=http://vminsert:8480/insert/multitenant/prometheus/api/v1/write"
    depends_on:
      - vmauth-write

  # ──────────────────────────────────────────────────────────────────────────
  # Alertmanager — single instance, routes alerts by tenant label
  # ──────────────────────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:latest
    restart: unless-stopped
    networks:
      - vm-cluster
    ports:
      - "9093:9093"   # Alertmanager UI → http://localhost:9093
    volumes:
      - ./config/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.listen-address=:9093"

  # ──────────────────────────────────────────────────────────────────────────
  # vmalert — one instance per tenant for rule/alert isolation
  # Each queries its own tenant namespace and writes results back to it.
  # The --external.label=tenant=<name> flag tags all alerts so alertmanager
  # can route them to the correct tenant receiver.
  # ──────────────────────────────────────────────────────────────────────────
  vmalert-tenant1:
    image: victoriametrics/vmalert:latest
    restart: unless-stopped
    networks:
      - vm-cluster
    ports:
      - "8880:8880"   # vmalert tenant1 UI → http://localhost:8880
    volumes:
      - ./config/rules/tenant1:/etc/vmalert/rules:ro
    command:
      - "--datasource.url=http://vmselect:8481/select/1/prometheus"
      - "--remoteWrite.url=http://vminsert:8480/insert/1/prometheus"
      - "--notifier.url=http://alertmanager:9093"
      - "--rule=/etc/vmalert/rules/*.yml"
      - "--httpListenAddr=:8880"
      - "--evaluationInterval=15s"
      - "--external.label=tenant=tenant1"
    depends_on:
      - vmselect
      - vminsert
      - alertmanager

  vmalert-tenant2:
    image: victoriametrics/vmalert:latest
    restart: unless-stopped
    networks:
      - vm-cluster
    ports:
      - "8881:8880"   # vmalert tenant2 UI → http://localhost:8881
    volumes:
      - ./config/rules/tenant2:/etc/vmalert/rules:ro
    command:
      - "--datasource.url=http://vmselect:8481/select/2/prometheus"
      - "--remoteWrite.url=http://vminsert:8480/insert/2/prometheus"
      - "--notifier.url=http://alertmanager:9093"
      - "--rule=/etc/vmalert/rules/*.yml"
      - "--httpListenAddr=:8880"
      - "--evaluationInterval=15s"
      - "--external.label=tenant=tenant2"
    depends_on:
      - vmselect
      - vminsert
      - alertmanager

  # ──────────────────────────────────────────────────────────────────────────
  # Grafana — pre-configured with one datasource per tenant
  # ──────────────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    networks:
      - vm-cluster
    ports:
      - "3000:3000"   # Grafana UI → http://localhost:3000  (admin / admin)
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - vmauth-read

networks:
  vm-cluster:
    driver: bridge

volumes:
  vmstorage-data:
  vmstorage2-data:
  vmagent-data:
  grafana-data:
  alertmanager-data:
